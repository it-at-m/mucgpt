description: # Sprachspezifische Produktbeschreibung
  de:
    genericName: "KI-Werkzeug"
    awards:
      - >-
        eGovernment-Wettbewerb 2024: 3. Platz in der Kategorie
        "Digitalisierungsschub durch KI und moderne Infrastruktur "
    shortDescription: >
      MUCGPT ist ein KI-Werkzeug zur Arbeit mit generativen Sprachmodellen und
      bietet u.a. personalisierbare Assistenten und Tools an.
    longDescription: >
      MUCGPT hat vier Hauptfunktionen und bietet die Möglichkeit, eigene
      Assistenten mit spezifischen Funktionen zu erstellen. Die Hauptfunktionen
      sind Chat zum Austausch mit dem zugrunde liegenden LLM, Zusammenfassen
      zum Verdichten langer Texte und Dateien, Brainstorming zum Erstellen von
      Mindmaps zu einem Thema und Einfache Sprache, um Texte in leichter
      verständliche Sprache zu übersetzen.

      **Chat**

      Die Chat-Funktion von MUCGPT ist ein typischer Chatraum, in dem Sie mit
      dem LLM schreiben können, um Informationen zu nahezu jedem Thema zu
      erhalten.

      MUCGPT kann Antworten erzeugen, die denen eines Menschen sehr ähnlich
      sind, da es ein großes vortrainiertes Sprachmodell verwendet. Es verfügt
      über eine Reihe von Funktionen und Fähigkeiten, die es ermöglichen,
      natürliche Sprachverarbeitung, mehrstufige Gespräche, Personalisierung,
      Stimmungsanalyse, Wissensabfrage und Aufgabenbearbeitung umzusetzen. Diese
      Fähigkeiten helfen MUCGPT dabei, Benutzeranfragen so zu verstehen und zu
      beantworten, dass sie an die jeweiligen Bedürfnisse angepasst sind, was
      es zu einem leistungsstarken Werkzeug für Anwendungsfälle macht, in denen
      eine menschenähnliche Interaktion gewünscht ist.

      Darüber hinaus können Benutzer eine Systemanweisung konfigurieren, die
      allen von ihnen gesendeten Nachrichten vorangestellt wird. Auch die
      Temperatur der generierten Antwort lässt sich anpassen, um die
      Zufälligkeit oder Kreativität der Modellausgabe zu steuern.

      Die Chat-Funktion enthält einen Chatverlauf, mit dem Benutzer ihre
      früheren Unterhaltungen einsehen und dort weitermachen können, wo sie
      aufgehört haben. Außerdem können wichtige Chats als Favoriten markiert
      werden, um schneller darauf zuzugreifen. Der gesamte Chatverlauf wird
      lokal im Browser des Benutzers mit IndexedDB gespeichert, sodass keine
      Chataufzeichnungen in der Cloud oder an anderer Stelle gespeichert
      werden.


      **Zusammenfassen**

      Die Funktion zum Zusammenfassen ermöglicht es, lange Texte oder Dokumente
      zu verdichten und die relevantesten Informationen zu extrahieren, um
      einen neuen zusammengefassten Text zu erstellen. Der Benutzer kann den
      Detaillierungsgrad der generierten Antwort in drei Stufen anpassen
      (kurz, mittel, lang).

      **Brainstorming**

      Die Brainstorming-Funktion ermöglicht es Benutzern, Mindmaps zu erstellen,
      um Inspiration zu einem bestimmten Thema zu finden.

      Die erstellten Mindmaps können heruntergeladen und mit
      [Freeplane](https://docs.freeplane.org/) weiterverarbeitet werden.

      **Einfache Sprache**

      Einfache Sprache ist eine Funktion, mit der sich komplexe Texte in
      verständliche Sprache übersetzen lassen. Dies ist besonders hilfreich für
      Menschen mit Leseschwierigkeiten oder für Personen, deren Muttersprache
      nicht die Originalsprache ist. Durch die Umwandlung komplizierter Sätze
      und fortgeschrittener Wortwahl in einfachere Strukturen und geläufigere
      Wörter macht das Werkzeug den Text verständlicher und leichter lesbar.
      Das verbessert nicht nur die Zugänglichkeit der Inhalte, sondern fördert
      auch Inklusion, indem es ein breiteres Publikum mit unterschiedlichen
      Sprachkenntnissen anspricht. Die Prompts und die Logik dieser Funktion
      basieren auf dem Projekt der Kantonsverwaltung Zürich
      ([Github](https://github.com/machinelearningZH/simply-simplify-language)).

      **Eigene Assistenten**

      MUCGPT ermöglicht es Benutzern, eigene benutzerdefinierte Assistenten zu
      erstellen, die auf spezifische Anforderungen und Anwendungsfälle
      zugeschnitten sind. Durch die Definition individueller Prompts und die
      Konfiguration des Verhaltens des Sprachmodells können Assistenten
      entwickelt werden, die spezialisierte Aufgaben übernehmen oder gezielte
      Informationen bereitstellen. Diese Funktion ist besonders nützlich für
      Unternehmen, Bildungseinrichtungen und Entwickler, die maßgeschneiderte
      Lösungen für ihre Arbeitsabläufe benötigen.

      Beim Erstellen eines Assistenten wird eine Systemanweisung festgelegt,
      die die Antworten des Assistenten steuert. Außerdem werden Parameter wie
      die Temperatur definiert, um die Kreativität der Ausgabe zu beeinflussen,
      und die Länge der Ausgabetoken festgelegt. Benutzer können mehrere
      Assistenten speichern und verwalten und je nach Bedarf zwischen ihnen
      wechseln, um unterschiedliche Aufgaben oder Szenarien abzudecken. Die
      Assistenten werden lokal im Browser mit IndexedDB gespeichert.

      Die Flexibilität der Funktion Eigene Assistenten ermöglicht es den
      Benutzern, das volle Potenzial von MUCGPT auszuschöpfen und das System zu
      einem vielseitigen Werkzeug für eine breite Palette von Anwendungen zu
      machen.

      MUCGPT unterstützt außerdem die Erstellung statischer, schreibgeschützter
      Community-Assistenten, die allen Benutzern zur Verfügung stehen. Diese
      Assistenten können in der \`.env\`-Datei definiert werden, sodass
      Administratoren vordefinierte Assistenten einrichten können, die häufige
      Anforderungen abdecken oder standardisierte Antworten bereitstellen. Dies
      stellt sicher, dass alle Benutzer Zugriff auf konsistente und zuverlässige
      Assistenten haben, ohne diese verändern zu können, und sorgt so für
      Einheitlichkeit und Kontrolle über die bereitgestellten Informationen.
      Diese Assistenten können mit Beispielen und Schnellprompts versehen sein,
      die dem Benutzer zeigen, wie der Assistent verwendet wird.

      Durch den Einsatz von Community-Assistenten können Organisationen
      sicherstellen, dass ihre Benutzer Zugriff auf wichtige Werkzeuge und
      Informationen haben, die auf ihre spezifischen Anforderungen zugeschnitten
      sind, was das gesamte Nutzungserlebnis und die Produktivität verbessert.

      **Allgemeine Funktionen**

      Erzeugte Texte in verschiedenen Formaten werden korrekt dargestellt.
      Folgende Formate werden derzeit unterstützt:

      - Markdown
      - Einfaches HTML
      - In Markdown-Codeblöcke eingebettete Mermaid-Diagramme
      - Mathematische Formeln in LaTeX, eingeschlossen in \`$$ ... $$\`
        Begrenzern
    features:
      - KI-Chat
      - teilbare Assistenten
      - Werkzeuge
      - Brainstorming
      - Übersetzung
      - Leichte Sprache
