id: recreate_mucgpt_client_roles
author: Default
realm: local_realm
changes:
  - addRole:
      name: lhm-ab-mucgpt-user
      description: Example role with read access to application data
      clientRole: true
      clientId: mucgpt
      composite: false

  - assignRole:
      user: mucgpt-user
      role: lhm-ab-mucgpt-user
      clientId: mucgpt

  - assignRole:
      user: mucgpt-kicc-user
      role: lhm-ab-mucgpt-user
      clientId: mucgpt

  - assignRole:
      user: mucgpt-hr-user
      role: lhm-ab-mucgpt-user
      clientId: mucgpt
