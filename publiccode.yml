  en:
    genericName: KI tool
    awards:
      - >-
        eGovernment competition 2024: 3rd place in the category
        "Digitalization boost through AI and modern infrastructure"
    shortDescription: >-
      MUCGPT is an AI tool for working with generative language models and
      offers customizable assistants and tools.
    longDescription: >-
      MUCGPT provides four main capabilities and lets users create custom
      assistants with specific functions. The main capabilities are Chat for
      interacting with the underlying LLM, Summarize for condensing long texts
      and files, Brainstorming for creating mind maps around a topic, and Easy
      Language for translating text into simpler, more accessible language.

      **Chat**

      The chat feature of MUCGPT is a typical chat room where users can write
      with the LLM to get information about almost any topic.

      MUCGPT can generate responses that closely resemble those of a human,
      because it uses a large pretrained language model. It offers a range of
      features and capabilities that support natural language processing,
      multi-turn conversations, personalization, sentiment analysis, knowledge
      retrieval, and task completion. These capabilities help MUCGPT
      understand and answer user requests in a way that is tailored to their
      needs, making it a powerful tool for use cases where human-like
      interaction is desired.

      In addition, users can configure a system prompt that is prepended to any
      message they send. The temperature of the generated response can also be
      adjusted to control the randomness or creativity of the model output.

      The chat feature includes a chat history that lets users view previous
      conversations and continue where they left off. Important chats can also
      be marked as favorites for quicker access. All chat history is stored
      locally in the user's browser using IndexedDB, so no chat data is stored
      in the cloud or elsewhere.

      **Summarize**

      The Summarize feature allows users to condense long texts or documents
      and extract the most relevant information to create a new summarized
      text. The user can adjust the level of detail of the generated answer in
      three levels: short, medium, and long.

      **Brainstorming**

      The Brainstorming feature allows users to create mind maps to help them
      find inspiration on a given topic.

      The resulting mind maps can be downloaded and further processed with
      [Freeplane](https://docs.freeplane.org/).

      **Easy language**

      Easy language is a feature that enables users to translate complex texts
      into plain language. This is especially useful for people who struggle
      with reading comprehension or whose native language is not the original
      language. By converting intricate sentences and advanced vocabulary into
      simpler structures and more familiar words, the tool makes the text more
      understandable and easier to read. This not only improves accessibility
      but also promotes inclusion by serving a broader audience with varying
      language proficiency. The prompts and logic for this feature are based on
      the project of the Cantonal Administration of Zurich
      ([Github](https://github.com/machinelearningZH/simply-simplify-language)).

      **Own assistants**

      MUCGPT allows users to create custom assistants tailored to specific
      needs and use cases. By defining unique prompts and configuring the
      behavior of the language model, users can build assistants that perform
      specialized tasks or provide targeted information. This feature is
      especially useful for businesses, educators, and developers who need
      bespoke solutions for their workflows.

      Creating an assistant involves defining a system prompt that guides the
      assistant's responses, setting parameters such as temperature to control
      output creativity, and defining the length of the output tokens. Users
      can save and manage multiple assistants and switch between them as
      needed for different tasks or scenarios. The assistants are stored
      locally in the browser using IndexedDB.

      The flexibility of the Own assistants feature helps users leverage the
      full potential of MUCGPT, making it a versatile tool for a wide range of
      applications.

      MUCGPT also supports the creation of static, read-only Community
      Assistants that are available to all users. These assistants can be
      defined in the `.env` file, allowing administrators to set up predefined
      assistants that cover common needs or provide standardized responses.
      This ensures that all users have access to consistent and reliable
      assistants without being able to modify them, maintaining uniformity and
      control over the provided information. These assistants can include
      predefined examples and quick prompts that show users how to use them.

      By using Community Assistants, organizations can ensure that their users
      have access to essential tools and information tailored to their specific
      requirements, improving the overall user experience and productivity.

      **General features**

      Generated text in various formats is displayed correctly. The currently
      supported formats are:

      - Markdown
      - Plain HTML
      - Mermaid diagrams embedded in Markdown code blocks
      - Mathematical formulas written in LaTeX, enclosed in `$$ ... $$`
        delimiters
    features:
      - AI chat
      - shareable assistants
      - tools
      - brainstorming
      - translation
      - easy language
    screenshots:
      - docs/chatscreen.png
      - docs/own-assistant.png
      - docs/mindmap.png
      - docs/simply.png
      - docs/sum.png
