  en:
    genericName: AI tool
    awards:
      - >-
        eGovernment competition 2024: 3rd place in the category "Digitalization
        boost through AI and modern infrastructure"
    shortDescription: >-
      MUCGPT is an AI tool for working with generative language models and
      offers customizable assistants and tools.
    longDescription: >-
      # MUCGPT - A versatile AI tool for public administration


      MUCGPT has four main functions:

      - _Chat_ to interact with the underlying LLM

      - _Summarize_ to condense long texts and files

      - _Brainstorming_ to create mind maps on a topic

      - and _Simple Language_ to translate texts into easily understandable
      language.


      Additionally, MUCGPT offers the possibility to create custom assistants
      with specific functions to adapt the interaction with the LLM to
      individual needs. This allows users to customize the tool to their needs
      and achieve an even higher integration into their workflows.


      ## Chat


      With the chat function, users can write with the LLM on almost any topic.


      MUCGPT uses a large language model and provides understandable,
      context-related answers.  A system instruction can be prepended to any
      message, and the temperature can be adjusted to make the output more
      factual or creative.


      The chat history is stored locally in the browser (IndexedDB).
      Conversations can be continued later, and important chats can be marked as
      favorites.


      In addition, various output formats such as Markdown, HTML, embedded
      Mermaid diagrams, and mathematical LaTeX formulas (`$$ ... $$`) are
      supported.

      ## Summarize


      The summarize function allows long texts or documents to be condensed and
      the most relevant information extracted to create a new summarized text.


      The user can adjust the level of detail of the generated response in three
      stages (short, medium, long).


      ## Brainstorming


      The brainstorming function allows users to create mind maps to find
      inspiration on a specific topic.


      The created mind maps can be downloaded and further processed with
      [Freeplane](https://docs.freeplane.org/).


      ## Simple Language


      Translates complex texts into understandable language.  This promotes
      inclusion and accessibility, as it helps people with reading difficulties
      or non-native speakers.


      The logic is based on a project by the Canton of Zurich administration
      ([Github](https://github.com/machinelearningZH/simply-simplify-language)).


      ## Custom Assistants


      Users can create tailor-made assistants for specific tasks.  System
      instructions to control behavior as well as model parameters (such as
      temperature) can be defined. These assistants are stored locally in the
      browser.


      Administrators can also provide global "Community Assistants" via
      configuration files.  These are read-only, ensure standardized responses,
      and can be provided with example prompts.
    features:
      - AI chat
      - shareable assistants
      - tools
      - brainstorming
      - translation
      - easy language
    screenshots:
      - docs/chatscreen.png
      - docs/own-assistant.png
      - docs/mindmap.png
      - docs/simply.png
      - docs/sum.png
