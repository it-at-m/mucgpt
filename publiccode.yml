  de:
    genericName: "KI-Werkzeug"
    awards:
      - >-
        eGovernment-Wettbewerb 2024: 3. Platz in der Kategorie
        "Digitalisierungsschub durch KI und moderne Infrastruktur "
    shortDescription: "MUCGPT ist ein KI-Werkzeug zur Arbeit mit generativen Sprachmodellen und bietet u.a. personalisierbare Assistenten und Tools an."
    longDescription: >
      # MUCGPT - Ein vielseitiges KI-Werkzeug für die öffentliche Verwaltung


      MUCGPT hat vier Hauptfunktionen:

      - _Chat_ zum Austausch mit dem zugrunde liegenden LLM

      - _Zusammenfassen_ zum Verdichten langer Texte und Dateien

      - _Brainstorming_ zum Erstellen von Mindmaps zu einem Thema 

      - und _Einfache Sprache_, um Texte in leichter verständliche Sprache zu übersetzen.


      Zudem bietet MUCGPT die Möglichkeit, eigene Assistenten mit spezifischen Funktionen zu erstellen, um die Interaktion mit dem LLM an individuelle Bedürfnisse anzupassen.
      Hierüber können Benutzer das Werkzeug auf ihre Bedürfnisse anpassen und eine noch höhere Integration in ihre Arbeitsabläufe erreichen.


      ## Chat


      Mit der Chat-Funktion können Benutzer mit dem LLM zu fast jedem Thema schreiben.


      MUCGPT nutzt ein großes Sprachmodell und liefert verständliche, kontextbezogene Antworten. 
      Eine Systemanweisung kann jeder Nachricht vorangestellt werden, und die Temperatur lässt sich einstellen, um die Ausgabe sachlicher oder kreativer zu machen.


      Der Chatverlauf bleibt lokal im Browser gespeichert (IndexedDB). 
      Unterhaltungen können später fortgesetzt und wichtige Chats als Favoriten markiert werden.


      Zudem werden verschiedene Ausgabeformate wie Markdown, HTML, eingebettete Mermaid-Diagramme und mathematische LaTeX-Formeln (`$$ ... $$`) unterstützt.

      ## Zusammenfassen


      Die Funktion zum Zusammenfassen ermöglicht es, lange Texte oder Dokumente zu verdichten und die relevantesten Informationen zu extrahieren, um einen neuen zusammengefassten Text zu erstellen. 


      Der Benutzer kann den Detaillierungsgrad der generierten Antwort in drei Stufen anpassen (kurz, mittel, lang).


      ## Brainstorming


      Die Brainstorming-Funktion ermöglicht es Benutzern, Mindmaps zu erstellen, um Inspiration zu einem bestimmten Thema zu finden.


      Die erstellten Mindmaps können heruntergeladen und mit [Freeplane](https://docs.freeplane.org/) weiterverarbeitet werden.


      ## Einfache Sprache


      Übersetzt komplexe Texte in verständliche Sprache. 
      Dies fördert die Inklusion und Barrierefreiheit, da es Menschen mit Leseschwierigkeiten oder Nicht-Muttersprachlern hilft. 


      Die Logik basiert auf einem Projekt der Kantonsverwaltung Zürich ([Github](https://github.com/machinelearningZH/simply-simplify-language)).


      ## Eigene Assistenten


      Nutzer können maßgeschneiderte Assistenten für spezifische Aufgaben erstellen. 
      Dabei lassen sich Systemanweisungen zur Steuerung des Verhaltens sowie Modell-Parameter (wie Temperatur) definieren.
      Diese Assistenten werden lokal im Browser gespeichert.


      Administratoren können zudem globale "Community-Assistenten" über Konfigurationsdateien bereitstellen. 
      Diese sind schreibgeschützt, sorgen für standardisierte Antworten und können mit Beispiel-Prompts versehen werden.
