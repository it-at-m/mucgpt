description:
  de:
    localisedName: KI-Werkzeug
    shortDescription: MUCGPT ist ein KI-Werkzeug mit wiederverwendbaren, teilbaren Assistenten und erweiterbaren Tools.
    longDescription: >
      # MUCGPT 2.0 - Assistenten im Mittelpunkt


      MUCGPT ist eine Assistenten-Plattform für die öffentliche Verwaltung. Im
      Zentrum stehen wiederverwendbare, arbeitsablauf-spezifische Assistenten
      mit eigenen Anweisungen, Verhalten, optionalen Tools und Teilungsumfang.
      Der Chat ist die Ausführungsoberfläche – Assistenten geben der Arbeit
      Struktur, so dass wiederkehrende Aufgaben schneller und verlässlicher
      werden.


      Mit dem Chat können Benutzer verständliche, kontextbezogene Antworten vom
      zugrunde liegenden Sprachmodell erhalten. Eine Systemanweisung kann
      vorangestellt werden; die Temperatur ist einstellbar. Der Chatverlauf wird
      lokal im Browser (IndexedDB) gespeichert. Markdown, HTML, Mermaid und
      LaTeX (`$$ ... $$`) werden unterstützt.


      Die Assistenten lassen sich erstellen, privat nutzen und mit Bereichen/Teams
      teilen. Konfiguration (Rolle, Einschränkungen, Startprompts, Tools,
      Modelle) ist transparent, damit Nutzer Vertrauen fassen können.


      Die Tools sind erweiterbar. Beispiele: Zusammenfassen langer Texte,
      Brainstorming als Mindmap, oder "Einfache Sprache" zur Vereinfachung von
      Texten. Diese Beispiele sind demonstrativ – die Plattform ist auf
      Erweiterbarkeit ausgelegt.
    features:
      - KI-Chat
      - Assistenten erstellen und teilen
      - Erweiterbare Tools (z. B. Brainstorming, Einfache Sprache)
    screenshots:
      - docs/startpage.png
      - docs/chatscreen.png
      - docs/assistant_creator.png
      - docs/share_assistants.png
      - docs/tools.png
      - docs/models.png
      - docs/tutorials.png
      - docs/darkmode_i18n.png
    awards:
      - 'eGovernment-Wettbewerb 2024: 3. Platz in der Kategorie
        "Digitalisierungsschub durch KI und moderne Infrastruktur"'
  en:
    localisedName: AI toolkit
    shortDescription: MUCGPT is an AI toolkit centered on reusable, shareable assistants with extensible tools.
    longDescription: >-
      # MUCGPT 2.0 - Assistants first


      MUCGPT is an assistant platform for public administration. The core
      product object is the assistant: a reusable, workflow-specific chat setup
      with its own instructions, behavior, optional tools, and sharing scope.
      Chat is the execution surface; assistants provide structure so recurring
      work becomes faster and more reliable.


      The chat supports system instructions and adjustable temperature. History
      is stored locally in the browser (IndexedDB). Output formats include
      Markdown, HTML, embedded Mermaid diagrams, and LaTeX (`$$ ... $$`).


      Users can create assistants for their own work and share them with teams
      or departments when useful beyond a private workflow. Ownership, scope,
      and configuration are transparent to support trust and control.


      Tools are extensible. Examples include summarizing long texts,
      brainstorming as mind maps, and an easy-language mode for simpler text.
      These are illustrative—the platform is designed for extension.
    features:
      - AI chat
      - create and share assistants
      - extensible tools (e.g., brainstorming, easy language)
      - summarization
    screenshots:
      - docs/startpage.png
      - docs/chatscreen.png
      - docs/assistant_creator.png
      - docs/share_assistants.png
      - docs/tools.png
      - docs/models.png
      - docs/tutorials.png
      - docs/darkmode_i18n.png
    awards:
      - 'eGovernment competition 2024: 3rd place in the category "Digitalization
        boost through AI and modern infrastructure"'
