version: 1
formatters:
  simple:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  http:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S.%f"
  json:
    class: core.logtools.JsonFormatter
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: json
    stream: ext://sys.stdout
  httpx:
    class: logging.StreamHandler
    formatter: json
    stream: ext://sys.stderr
loggers:
  uvicorn.error:
    level: ${LOG_LEVEL_UVICORN_ERROR:-ERROR}
    handlers: [console]
    propagate: no
  uvicorn.access:
    level: ${LOG_LEVEL_UVICORN_ACCESS:-INFO}
    handlers: [console]
    propagate: no
  dev:
    level: ${LOG_LEVEL_DEV:-ERROR}
    handlers: [console]
    propagate: no
  mucgpt-memory:
    level: ${LOG_LEVEL_MUCGPT_MEMORY:-INFO}
    handlers: [console]
    propagate: no
  httpx:
    level: ${LOG_LEVEL_HTTPX:-ERROR}
    handlers: [httpx]
    propagate: no
  httpcore:
    level: ${LOG_LEVEL_HTTPCORE:-ERROR}
    handlers: [httpx]
    propagate: no
root:
  level: DEBUG
  handlers: [console]
